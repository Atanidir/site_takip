{% extends 'base.html' %}
{% block title %}Aidat Sil{% endblock %}
{% block page_title %}Aidat Kayıtlarını Sil{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">

        <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 mb-5 flex items-start gap-3">
            <i class="fa-solid fa-triangle-exclamation text-red-500 mt-0.5"></i>
            <p class="text-sm text-red-700">Seçilen dönemdeki aidat kayıtları <strong>kalıcı olarak silinecek</strong>. Bu işlem geri alınamaz.</p>
        </div>

        <form method="POST" class="space-y-4" onsubmit="return onay()">

            <!-- Site -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Site <span class="text-red-500">*</span></label>
                <select name="site_id" id="siteSelect" required onchange="loadBloklar(this.value)"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
                    {% for s in sites %}
                    <option value="{{ s.id }}" {{ 'selected' if s.id == site.id }}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Blok -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Blok <span class="text-xs text-gray-400">(opsiyonel — boş bırakırsanız tüm site)</span></label>
                <select name="block_id" id="blockSelect"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
                    <option value="">— Tüm Site —</option>
                </select>
            </div>

            <!-- Dönem -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Yıl <span class="text-red-500">*</span></label>
                    <input type="number" name="year" required value="{{ year }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ay <span class="text-red-500">*</span></label>
                    <select name="month" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
                        {% set months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'] %}
                        {% for i in range(1, 13) %}
                        <option value="{{ i }}" {{ 'selected' if i == month }}>{{ months[i-1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-red-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-red-700 transition-colors">
                    <i class="fa-solid fa-trash mr-1"></i> Sil
                </button>
                <a href="{{ url_for('site_admin.dues') }}"
                   class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadBloklar(siteId) {
    const sel = document.getElementById('blockSelect');
    sel.innerHTML = '<option value="">— Tüm Site —</option>';
    const res  = await fetch(`/site-admin/api/blocks/${siteId}`);
    const data = await res.json();
    data.forEach(b => sel.innerHTML += `<option value="${b.id}">${b.name}</option>`);
}

function onay() {
    return confirm('Bu dönemdeki aidat kayıtları kalıcı olarak silinecek. Emin misiniz?');
}

// Sayfa yüklenince blokları yükle
window.addEventListener('load', () => {
    const sel = document.getElementById('siteSelect');
    if (sel.value) loadBloklar(sel.value);
});
</script>
{% endblock %}
