{% extends 'base.html' %}
{% block title %}Evrak Yükle{% endblock %}
{% block page_title %}Evrak Yükle{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" enctype="multipart/form-data" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kategori <span class="text-red-500">*</span></label>
                <select name="category" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Kategori seçin...</option>
                    {% for kat in kategoriler %}
                    <option value="{{ kat }}">{{ kat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Evrak Başlığı <span class="text-red-500">*</span></label>
                <input type="text" name="title" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Örn: 2024 Ocak Toplantı Tutanağı">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Dosya <span class="text-red-500">*</span></label>
                <input type="file" name="dosya" required
                       accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.txt"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-400 mt-1">PDF, Word, Excel, resim dosyaları kabul edilir.</p>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 bg-green-600 text-white text-sm py-2.5 rounded-lg hover:bg-green-700 transition-colors font-medium">
                    <i class="fa-solid fa-upload mr-1"></i> Yükle
                </button>
                <a href="{{ url_for('site_admin.evraklar') }}"
                   class="flex-1 bg-gray-100 text-gray-700 text-sm py-2.5 rounded-lg hover:bg-gray-200 transition-colors text-center">
                    İptal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
