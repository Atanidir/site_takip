{% extends 'base.html' %}
{% block title %}{{ 'Daire Düzenle' if apartment else 'Yeni Daire' }}{% endblock %}
{% block page_title %}{{ block.name }} — {{ 'Daire Düzenle' if apartment else 'Manuel Daire Ekle' }}{% endblock %}

{% block content %}
<div class="max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Daire No <span class="text-red-500">*</span></label>
                    <input type="text" name="number" required value="{{ apartment.number if apartment else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Ör: 001">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kat</label>
                    <input type="text" name="floor" value="{{ apartment.floor if apartment and apartment.floor is not none else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Örn: Zemin, Bodrum, 1, 2...">
                </div>
            </div>
            <input type="hidden" name="number_type" value="{{ apartment.number_type if apartment else 'numeric' }}">
            <input type="hidden" name="number_length" value="{{ apartment.number_length if apartment else 3 }}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">UAVT Kodu</label>
                <input type="text" name="uavt_code" value="{{ apartment.uavt_code if apartment else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Aidat Muafiyeti -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
                <div class="flex items-center gap-3 mb-2">
                    <input type="checkbox" name="aidat_muaf" id="aidat_muaf"
                           {{ 'checked' if apartment and apartment.aidat_muaf }}
                           onchange="document.getElementById('muaf_aciklama_div').classList.toggle('hidden', !this.checked)">
                    <label for="aidat_muaf" class="text-sm font-medium text-yellow-800">
                        Bu daire aidat hesabından muaf (dükkan, depo vb.)
                    </label>
                </div>
                <div id="muaf_aciklama_div" class="{{ '' if apartment and apartment.aidat_muaf else 'hidden' }}">
                    <input type="text" name="muaf_aciklama"
                           value="{{ apartment.muaf_aciklama if apartment else '' }}"
                           placeholder="Muafiyet açıklaması (örn: Zemin kat dükkan)"
                           class="w-full px-3 py-2 border border-yellow-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-blue-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">Kaydet</button>
                <a href="{{ url_for('site_admin.apartments', bid=block.id) }}"
                   class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
