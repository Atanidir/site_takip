{% extends 'base.html' %}
{% block title %}{{ 'Gider Düzenle' if expense else 'Gider Ekle' }}{% endblock %}
{% block page_title %}{{ 'Gider Düzenle' if expense else 'Yeni Gider Kaydı' }}{% endblock %}

{% block content %}
<div class="max-w-xl">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Site <span class="text-red-500">*</span></label>
                <select name="site_id" id="siteSelect" required onchange="loadSiteData(this.value)"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {% for s in sites %}
                    <option value="{{ s.id }}" {{ 'selected' if s.id == (expense.site_id if expense else site.id) }}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Blok <span class="text-xs text-gray-400">(opsiyonel)</span></label>
                <select name="block_id" id="blockSelect"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">— Tüm Site —</option>
                    {% for b in blocks %}
                    <option value="{{ b.id }}" {{ 'selected' if expense and expense.block_id == b.id }}>{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kategori <span class="text-red-500">*</span></label>
                    <select name="category_id" id="categorySelect" required onchange="loadTypes(this.value)"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">— Seçin —</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {{ 'selected' if expense and expense.category_id == cat.id }}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gider Türü <span class="text-red-500">*</span></label>
                    <select name="type_id" id="typeSelect" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">— Önce kategori seçin —</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tutar (₺) <span class="text-red-500">*</span></label>
                    <input type="number" name="amount" step="0.01" min="0" required
                           value="{{ expense.amount|float if expense else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gider Tarihi <span class="text-red-500">*</span></label>
                    <input type="date" name="expense_date" required value="{{ today }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Dönem Yılı <span class="text-red-500">*</span></label>
                    <input type="number" name="period_year" required value="{{ now_year }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Dönem Ayı <span class="text-red-500">*</span></label>
                    <select name="period_month" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        {% set months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'] %}
                        {% for i in range(1, 13) %}
                        <option value="{{ i }}" {{ 'selected' if i == now_month }}>{{ months[i-1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Açıklama</label>
                <input type="text" name="description" value="{{ expense.description or '' if expense else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fiş / Fatura No</label>
                <input type="text" name="receipt_no" value="{{ expense.receipt_no or '' if expense else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex gap-3">
                <button type="submit" class="bg-blue-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    {{ 'Güncelle' if expense else 'Kaydet' }}
                </button>
                <a href="{{ url_for('site_admin.expenses') }}" class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const _mevcut_type_id = {{ expense.type_id if expense else 'null' }};

async function loadTypes(catId, selectId=null) {
    const sel = document.getElementById('typeSelect');
    if (!catId) { sel.innerHTML = '<option value="">— Önce kategori seçin —</option>'; return; }
    sel.innerHTML = '<option value="">Yükleniyor…</option>';
    const res  = await fetch(`/site-admin/api/expense-types/${catId}`);
    const data = await res.json();
    sel.innerHTML = '<option value="">— Tür Seçin —</option>';
    data.forEach(t => {
        const selected = (selectId && t.id == selectId) ? 'selected' : '';
        sel.innerHTML += `<option value="${t.id}" ${selected}>${t.name}</option>`;
    });
}

async function loadSiteData(siteId) {
    const blkSel = document.getElementById('blockSelect');
    blkSel.innerHTML = '<option value="">— Tüm Site —</option>';
    const blkRes  = await fetch(`/site-admin/api/blocks/${siteId}`);
    const blkData = await blkRes.json();
    blkData.forEach(b => blkSel.innerHTML += `<option value="${b.id}">${b.name}</option>`);

    const catSel = document.getElementById('categorySelect');
    catSel.innerHTML = '<option value="">— Seçin —</option>';
    const catRes  = await fetch(`/site-admin/api/categories/${siteId}`);
    const catData = await catRes.json();
    catData.forEach(c => catSel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
    document.getElementById('typeSelect').innerHTML = '<option value="">— Önce kategori seçin —</option>';
}

// Sayfa yüklenince mevcut kategori seçiliyse türleri yükle
window.addEventListener('load', () => {
    const catSel = document.getElementById('categorySelect');
    if (catSel.value) loadTypes(catSel.value, _mevcut_type_id);
});
</script>
{% endblock %}
