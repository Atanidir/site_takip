{% extends 'base.html' %}
{% block title %}Yeni Kategori{% endblock %}
{% block page_title %}Yeni Gider Kategorisi{% endblock %}
{% block content %}
<div class="max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kategori Adı <span class="text-red-500">*</span></label>
                <input type="text" name="name" required placeholder="Ör: Demirbaş, Normal Gider"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Açıklama</label>
                <input type="text" name="description"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-3">
                <button type="submit" class="bg-blue-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">Kaydet</button>
                <a href="{{ url_for('site_admin.expense_categories') }}" class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
