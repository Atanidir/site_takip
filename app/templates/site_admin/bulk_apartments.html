{% extends 'base.html' %}
{% block title %}Toplu Daire Ekle{% endblock %}
{% block page_title %}{{ block.name }} — Toplu Daire Ekle{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-5" id="bulkForm">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Eklenecek Daire Sayısı <span class="text-red-500">*</span></label>
                <input type="number" name="count" id="count" min="1" max="500" required value="10"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Başlangıç Numarası</label>
                <input type="number" name="start_from" min="1" value="1"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Numaralandırma Türü <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex items-center gap-3 border border-gray-200 rounded-lg p-3 cursor-pointer hover:border-blue-400 transition-colors">
                        <input type="radio" name="number_type" value="numeric" checked onchange="toggleLength(this)">
                        <div>
                            <p class="text-sm font-medium text-gray-700">Numerik</p>
                            <p class="text-xs text-gray-400">001, 002, 003…</p>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 border border-gray-200 rounded-lg p-3 cursor-pointer hover:border-blue-400 transition-colors">
                        <input type="radio" name="number_type" value="alphanumeric" onchange="toggleLength(this)">
                        <div>
                            <p class="text-sm font-medium text-gray-700">Alfanumerik</p>
                            <p class="text-xs text-gray-400">1, 2, 3… (sıfır doldurmaz)</p>
                        </div>
                    </label>
                </div>
            </div>

            <div id="lengthSection">
                <label class="block text-sm font-medium text-gray-700 mb-1">Numara Uzunluğu (Sıfır Doldurma)</label>
                <select name="number_length"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="2">2 hane (01–99)</option>
                    <option value="3" selected>3 hane (001–999)</option>
                    <option value="4">4 hane (0001–9999)</option>
                </select>
            </div>

            <!-- Önizleme -->
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
                <p class="text-xs text-blue-700 font-medium mb-1">Önizleme:</p>
                <p class="text-sm text-blue-800 font-mono" id="preview">001, 002, 003, …, 010</p>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                        class="bg-blue-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fa-solid fa-layer-group mr-1"></i> Daireleri Oluştur
                </button>
                <a href="{{ url_for('site_admin.apartments', bid=block.id) }}"
                   class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleLength(radio) {
    document.getElementById('lengthSection').style.display =
        radio.value === 'numeric' ? 'block' : 'none';
    updatePreview();
}

function updatePreview() {
    const count    = parseInt(document.getElementById('count').value) || 10;
    const typeEl   = document.querySelector('input[name="number_type"]:checked');
    const type     = typeEl ? typeEl.value : 'numeric';
    const lenEl    = document.querySelector('select[name="number_length"]');
    const len      = lenEl ? parseInt(lenEl.value) : 3;
    const startEl  = document.querySelector('input[name="start_from"]');
    const start    = parseInt(startEl ? startEl.value : 1) || 1;

    const samples = [];
    for (let i = 0; i < Math.min(3, count); i++) {
        const n = start + i;
        samples.push(type === 'numeric' ? String(n).padStart(len, '0') : String(n));
    }
    if (count > 3) {
        samples.push('…');
        const last = start + count - 1;
        samples.push(type === 'numeric' ? String(last).padStart(len, '0') : String(last));
    }
    document.getElementById('preview').textContent = samples.join(', ');
}

document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('change', updatePreview);
    el.addEventListener('input', updatePreview);
});
updatePreview();
</script>
{% endblock %}
