{% extends 'base.html' %}
{% block title %}Yeni Şifre Belirle{% endblock %}

{% block auth_content %}
<div class="min-h-screen bg-gradient-to-br from-slate-800 to-blue-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-500 rounded-2xl mb-4 shadow-xl">
                <i class="fa-solid fa-lock text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Yeni Şifre</h1>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-lg font-semibold text-gray-800 mb-5">Yeni Şifrenizi Belirleyin</h2>

            {% for cat, msg in get_flashed_messages(with_categories=true) %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm
                {% if cat == 'danger' %}bg-red-50 text-red-700 border border-red-200
                {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                {{ msg }}
            </div>
            {% endfor %}

            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Yeni Şifre</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Şifre Tekrar</label>
                    <input type="password" name="confirm" required minlength="6"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="••••••••">
                </div>
                <button type="submit"
                        class="w-full bg-green-600 text-white font-semibold py-2.5 rounded-lg hover:bg-green-700 transition-colors text-sm">
                    <i class="fa-solid fa-check mr-1"></i> Şifremi Güncelle
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
