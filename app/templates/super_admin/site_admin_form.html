{% extends 'base.html' %}
{% block title %}Yeni Site Admin{% endblock %}
{% block page_title %}Yeni Site Admin Ekle{% endblock %}

{% block content %}
<div class="max-w-xl">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ad Soyad</label>
                    <input type="text" name="full_name" value="{{ admin.full_name if admin else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                    <input type="text" name="phone" value="{{ admin.phone if admin else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kullanıcı Adı <span class="text-red-500">*</span></label>
                <input type="text" name="username" required value="{{ admin.username if admin else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">E-posta <span class="text-red-500">*</span></label>
                <input type="email" name="email" required value="{{ admin.email if admin else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Şifre <span class="text-red-500">*</span></label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Lisans</label>
                <select name="license_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">— Lisans Seçin —</option>
                    {% for lic in licenses %}
                    <option value="{{ lic.id }}">{{ lic.license_key }} {% if lic.description %}({{ lic.description }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-purple-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-purple-700 transition-colors">
                    Kaydet
                </button>
                <a href="{{ url_for('super_admin.site_admins') }}"
                   class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition-colors">
                    İptal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
