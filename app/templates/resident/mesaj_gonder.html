{% extends 'base.html' %}
{% block title %}Yöneticiye Mesaj Gönder{% endblock %}
{% block page_title %}Yöneticiye Mesaj Gönder{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Konu <span class="text-red-500">*</span></label>
                <input type="text" name="title" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Mesajınızın konusu">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mesajınız <span class="text-red-500">*</span></label>
                <textarea name="message" required rows="6"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="Mesajınızı buraya yazın..."></textarea>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 bg-blue-600 text-white text-sm py-2.5 rounded-lg hover:bg-blue-700 transition-colors font-medium">
                    <i class="fa-solid fa-paper-plane mr-1"></i> Gönder
                </button>
                <a href="{{ url_for('resident.dashboard') }}"
                   class="flex-1 bg-gray-100 text-gray-700 text-sm py-2.5 rounded-lg hover:bg-gray-200 transition-colors text-center">
                    İptal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
