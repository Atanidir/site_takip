{% macro adres_sec(province='', district='', neighborhood='') %}
{% if request.blueprint == 'super_admin' %}
  {% set api_base = '/super-admin/api' %}
{% else %}
  {% set api_base = '/site-admin/api' %}
{% endif %}

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">İl</label>
        <select name="province" id="ilSelect"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                onchange="loadIlceler(this.value)">
            <option value="">— İl Seçin —</option>
        </select>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">İlçe</label>
        <select name="district" id="ilceSelect"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                onchange="loadMahalleler(this.value)">
            <option value="">— Önce İl Seçin —</option>
        </select>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mahalle</label>
        <select name="neighborhood" id="mahalleSelect"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">— Önce İlçe Seçin —</option>
        </select>
    </div>
</div>

<script>
const _mevcut_il       = {{ province|tojson }};
const _mevcut_ilce     = {{ district|tojson }};
const _mevcut_mahalle  = {{ neighborhood|tojson }};
const _api_base        = {{ api_base|tojson }};

async function loadIller() {
    const res  = await fetch(`${_api_base}/iller`);
    const data = await res.json();
    const sel  = document.getElementById('ilSelect');
    sel.innerHTML = '<option value="">— İl Seçin —</option>';
    data.forEach(il => {
        const opt = document.createElement('option');
        opt.value = il.ad;
        opt.textContent = il.ad;
        opt.dataset.id = il.id;
        if (il.ad === _mevcut_il) opt.selected = true;
        sel.appendChild(opt);
    });
    if (_mevcut_il) {
        const selected = [...sel.options].find(o => o.value === _mevcut_il);
        if (selected) await loadIlceler(selected.value, true);
    }
}

async function loadIlceler(ilAdi, init=false) {
    const ilSel = document.getElementById('ilSelect');
    const selected = [...ilSel.options].find(o => o.value === ilAdi);
    if (!selected || !selected.dataset.id) return;
    const ilId = selected.dataset.id;
    const res  = await fetch(`${_api_base}/ilceler/${ilId}`);
    const data = await res.json();
    const sel  = document.getElementById('ilceSelect');
    sel.innerHTML = '<option value="">— İlçe Seçin —</option>';
    data.forEach(ilce => {
        const opt = document.createElement('option');
        opt.value = ilce.ad;
        opt.textContent = ilce.ad;
        opt.dataset.id = ilce.id;
        if (ilce.ad === _mevcut_ilce) opt.selected = true;
        sel.appendChild(opt);
    });
    document.getElementById('mahalleSelect').innerHTML = '<option value="">— Önce İlçe Seçin —</option>';
    if (init && _mevcut_ilce) {
        const selIlce = [...sel.options].find(o => o.value === _mevcut_ilce);
        if (selIlce) await loadMahalleler(selIlce.value, true);
    }
}

async function loadMahalleler(ilceAdi, init=false) {
    const ilceSel = document.getElementById('ilceSelect');
    const selected = [...ilceSel.options].find(o => o.value === ilceAdi);
    if (!selected || !selected.dataset.id) return;
    const ilceId = selected.dataset.id;
    const res  = await fetch(`${_api_base}/mahalleler/${ilceId}`);
    const data = await res.json();
    const sel  = document.getElementById('mahalleSelect');
    sel.innerHTML = '<option value="">— Mahalle Seçin —</option>';
    data.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.ad;
        opt.textContent = m.ad;
        if (m.ad === _mevcut_mahalle) opt.selected = true;
        sel.appendChild(opt);
    });
}

loadIller();
</script>
{% endmacro %}
